name: Build and Push

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * 1" # weekly on Monday — picks up base image updates
  workflow_dispatch:
    inputs:
      base_image:
        description: "Base image override (e.g. ghcr.io/openclaw/openclaw-browser:2026.3.7)"
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openclaw-custom
  DEFAULT_BASE_IMAGE: ghcr.io/openclaw/openclaw:2026.3.7

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve base image
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.base_image }}" ]]; then
            image="${{ inputs.base_image }}"
          else
            image="${{ env.DEFAULT_BASE_IMAGE }}"
          fi
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Resolve image tags
        id: tags
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          sha="${GITHUB_SHA::8}"
          {
            echo "value<<EOF"
            echo "${IMAGE}:latest"
            echo "${IMAGE}:${sha}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve OCI labels
        id: labels
        shell: bash
        run: |
          set -euo pipefail
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "value<<EOF"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=${GITHUB_SHA::8}"
            echo "org.opencontainers.image.created=${created}"
            echo "org.opencontainers.image.base.name=${{ steps.base.outputs.image }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          pull: true # always fetch latest base image
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          tags: ${{ steps.tags.outputs.value }}
          labels: ${{ steps.labels.outputs.value }}
          provenance: false
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
